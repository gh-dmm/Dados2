<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎲</text></svg>">
    <title>Frecuencia de Dados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
	<!-- Incluir Chart.js desde CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Contenedor de las gráficas (colócalo debajo de tu tabla) -->
<div id="graficas-container" style="max-width: 800px; margin: 20px auto; padding: 10px;">
    <div style="margin-bottom: 40px;">
        <canvas id="graficoFrecuencias"></canvas>
    </div>
    <div>
        <canvas id="graficoAcumulada"></canvas>
    </div>
</div>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="container-fluid interface-layer vh-100 d-flex flex-column justify-content-between py-5">
        
        <div class="row justify-content-center align-items-center flex-column gap-3">
            <div class="col-auto text-center">
                <div class="card bg-dark text-white border-primary shadow-lg dice-card">
                    <div class="card-header border-primary text-uppercase small" id="display-header">Resultado</div>
                    <div class="card-body">
                        <div id="resultado-display" class="text-primary">-</div>
                    </div>
                </div>
            </div>

            <div class="col-auto">
                <div class="toggle-container shadow-sm">
                    <label class="switch">
                        <input type="checkbox" id="dice-toggle" class="active-one-die">
                        <span class="slider"></span>
                    </label>
                    <span id="status-label" class="mode-text text-white">UN DADO</span>
                </div>
            </div>
        </div>
	<div class="row justify-content-center mt-3 pointer-events-auto">
    <div class="col-auto">
        <div class="input-group mb-3" style="max-width: 280px; pointer-events: auto;">
            <span class="input-group-text bg-dark text-white border-primary">Cantidad:</span>
            <input type="number" id="multiplicador-input" class="form-control bg-dark text-white border-primary text-center" value="1" min="1" max="150">
            <button class="btn btn-primary" type="button" onclick="lanzarMultiple()">Multi-Giro</button>
        </div>
    </div>
</div>
        <div class="row justify-content-center">
            <div class="col-auto d-flex gap-3">
                <button class="btn btn-success btn-lg shadow-glow" onclick="lanzarDado()">
                    ¡GIRAR DADO!
                </button>
                <button class="btn btn-outline-danger btn-lg shadow-glow2" data-bs-toggle="modal" data-bs-target="#statsModal" onclick="actualizarTabla()">
                    VER ESTADÍSTICAS
                </button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="statsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark text-white border-info">
                <div class="modal-header border-info">
                    <h5 class="modal-title" id="modal-titulo-dinamico">Estadísticas de Lanzamientos</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="table-responsive">
                        <table class="table table-dark table-hover border-info vertical-align-middle text-center">
                            <thead>
                                <tr>
                                    <th>Resultado (x)</th>
                                    <th>Frecuencia (f)</th>
                                    <th>Frec. Relativa (h)</th>
                                    <th>Frec. Acumulada (H)</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-cuerpo">
                                </tbody>
                        </table>
                    </div>
                    <p id="total-lanzamientos" class="text-info mt-2">Total de lanzamientos: 0</p>
                    <div class="modal-footer border-info px-0 pb-0">
                        <button type="button" class="btn btn-success" onclick="exportarExcel()">
                            <i class="bi bi-file-earmark-excel"></i> Exportar a Excel
                        </button>
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="code.js"></script>
</body>
</html>
